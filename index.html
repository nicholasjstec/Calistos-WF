<script>
  // Error overlay that works at ANY time — before or after the app draws.
  window.__calistoFatal = function (msg) {
    var box = document.getElementById("calisto-fatal");
    if (!box) {
      box = document.createElement("div");
      box.id = "calisto-fatal";
      box.style.cssText = "position:fixed;left:10px;right:10px;bottom:10px;z-index:99999;max-height:55vh;overflow:auto;" +
        "background:#f4efe4;border:2px solid #9B3A34;border-radius:10px;padding:12px;font-family:monospace;" +
        "font-size:11.5px;white-space:pre-wrap;word-break:break-word;color:#281A1D;box-shadow:0 6px 24px rgba(0,0,0,.25)";
      document.body.appendChild(box);
    }
    box.textContent = "CALISTO'S error — screenshot this box:\n\n" + String(msg);
  };
  window.addEventListener("error", function (e) {
    var m = (e.message || "Unknown error");
    if (e.error && e.error.stack) m += "\n" + e.error.stack;
    if (e.filename) m += "\n" + e.filename + ":" + e.lineno;
    window.__calistoFatal(m);
  });
  window.addEventListener("unhandledrejection", function (e) {
    var r = e.reason;
    window.__calistoFatal("Promise error: " + ((r && r.stack) ? r.stack : (r && r.message) ? r.message : String(r)));
  });
  setTimeout(function () {
    var b = document.getElementById("boot");
    if (b && b.textContent.indexOf("Opening") === 0) {
      window.__calistoFatal("Still loading after 20 seconds — probably a slow connection. Try Wi-Fi and reload.");
    }
  }, 20000);
</script>

.cw-iconbtn{background:none;border:1px solid ${C.line};border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:${C.muted};flex-shrink:0;}
.cw-iconbtn:hover{color:${C.maroon};border-color:${C.maroon};}
.cw-nav{background:${C.card};border:1px solid ${C.line};border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:${C.ink};}
.cw-nav:hover{background:#fff;border-color:${C.maroon};color:${C.maroon};}
.cw-weekstrip{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cw-daycell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 2px 7px;border:1px solid ${C.line};border-radius:11px;cursor:pointer;}
.cw-toggle{position:relative;width:38px;height:20px;border-radius:30px;border:none;cursor:pointer;flex-shrink:0;transition:background .15s;}
.cw-knob{position:absolute;top:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.2);}
.cw-table{width:100%;border-collapse:collapse;font-size:12px;}
.cw-table th,.cw-table td{padding:9px;border-bottom:1px solid ${C.line};}
.cw-table th{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:${C.muted};font-weight:700;text-align:center;}
.cw-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px;}
.cw-chip{display:inline-flex;align-items:center;gap:5px;border:1px solid ${C.line};border-radius:30px;padding:6px 13px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;}
.cw-chatbox{background:${C.card};border:1px solid ${C.line};border-radius:14px;display:flex;flex-direction:column;height:62vh;overflow:hidden;}
.cw-msgs{flex:1;overflow-y:auto;padding:14px;}
.cw-bubble{padding:8px 12px;border-radius:13px;font-size:13.5px;line-height:1.45;border:1px solid;word-break:break-word;}
.cw-composer{display:flex;align-items:center;gap:8px;border-top:1px solid ${C.line};padding:8px 10px;background:${C.boneSoft};}
.cw-overlay{position:fixed;inset:0;background:rgba(40,20,25,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:60;overflow-y:auto;}
.cw-modal{background:${C.bone};border-radius:16px;padding:22px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.3);}
.cw-x{background:none;border:none;cursor:pointer;color:${C.muted};display:flex;padding:4px;border-radius:6px;}
.cw-x:hover{background:rgba(0,0,0,.06);}
.cw-seg{display:flex;gap:4px;background:${C.silverLt};border-radius:10px;padding:3px;}
.cw-segbtn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.cw-choice{font-family:inherit;}
.cw-choice:hover{border-color:${C.maroon};}
.cw-link{background:none;border:none;color:${C.maroon};font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;padding:0;}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid ${C.maroon};outline-offset:1px;}
@media (max-width:520px){.cw-tab span{font-size:10px;}.cw-main{padding:16px 13px 60px;}}
@media (prefers-reduced-motion:reduce){*{transition:none!important;}}
