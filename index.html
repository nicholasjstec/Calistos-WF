<script>
  function showBootError(msg) {
    var b = document.getElementById("boot");
    if (b) {
      b.innerHTML = "<div style='max-width:480px;margin:0 auto;text-align:left'>" +
        "<div style='font-weight:700;color:#9B3A34;margin-bottom:10px'>Something didn't load:</div>" +
        "<div style='font-family:monospace;font-size:13px;white-space:pre-wrap;background:#f4efe4;padding:12px;border-radius:8px;color:#281A1D'>" +
        msg.replace(/</g, "&lt;") + "</div>" +
        "<div style='margin-top:14px;font-size:13px;color:#8A8174'>Screenshot this and send it back.</div></div>";
    }
  }
  window.addEventListener("error", function (e) {
    showBootError((e.message || "Unknown error") + (e.filename ? "\n" + e.filename + ":" + e.lineno : ""));
  });
  window.addEventListener("unhandledrejection", function (e) {
    showBootError("Promise error: " + (e.reason && e.reason.message ? e.reason.message : String(e.reason)));
  });
  // If nothing has replaced #boot after 15s, the load is stuck (not just slow).
  setTimeout(function () {
    var b = document.getElementById("boot");
    if (b && b.textContent.indexOf("Opening") === 0) {
      showBootError("Still loading after 15 seconds. This usually means a slow connection " +
        "(try Wi-Fi instead of cellular) or one of the app's pieces failed to load from the internet. " +
        "Try reloading the page.");
    }
  }, 15000);
</script>

/* ---------------- LOAD EVERYTHING ----------------
   Assembles one `db` object in the shape the UI expects.
   RLS means each user only receives rows they're allowed to see,
   so private pay simply won't appear for other people.            */
async function loadAll() {
  const q = (t, sel = "*", order) => {
    let b = supabase.from(t).select(sel);
    if (order) b = b.order(order.col, { ascending: order.asc !== false });
    return b;
  };
  const [
    profiles, pp, roles, shifts, availability, trades, pay, affs,
    notifs, anns, channels, cmembers, messages, published,
    settings, timeEntries, timeOff,
  ] = await Promise.all([
    q("profiles"), q("private_pay"), q("roles"), q("shifts"),
    q("availability"), q("trades"), q("pay"), q("pay_affirmations"),
    q("notifications", "*", { col: "created_at", asc: false }),
    q("announcements"), q("channels"), q("channel_members"),
    q("messages", "*", { col: "created_at" }), q("published"),
    q("settings"), q("time_entries", "*", { col: "clock_in", asc: false }), q("time_off", "*", { col: "created_at", asc: false }),
  ]);

  const err = [profiles, pp, roles, shifts, availability, trades, pay, affs, notifs, anns, channels, cmembers, messages, published].find((r) => r.error);
  if (err) console.warn("load error:", err.error);

  const ppById = {};
  (pp.data || []).forEach((r) => { ppById[r.user_id] = r; });

  const users = (profiles.data || []).map((p) => {
    const comp = ppById[p.id];
    return {
      id: p.id, name: p.name, access: p.access, position: p.position,
      title: p.title, jobRoles: p.job_roles || [], color: p.color,
      rate: comp ? Number(comp.rate) : 0,
      method: comp ? comp.method : "—",
      handle: comp ? comp.handle || "" : "",
      hasComp: !!comp,
    };
  });

  const avail = {};
  (availability.data || []).forEach((a) => {
    (avail[a.user_id] = avail[a.user_id] || {})[a.dow] = { on: a.available, s: a.start_time, e: a.end_time };
  });

  const payMap = {};
  (pay.data || []).forEach((p) => { payMap[p.shift_id] = { tips: Number(p.tips) || 0, paid: p.paid, affirmed: [] }; });
  (affs.data || []).forEach((a) => {
    (payMap[a.shift_id] = payMap[a.shift_id] || { tips: 0, paid: false, affirmed: [] }).affirmed.push(a.user_id);
  });

  const pubMap = {};
  (published.data || []).forEach((p) => { pubMap[p.week_key] = new Date(p.released_at).getTime(); });

  return {
    users,
    roles: (roles.data || []).map((r) => r.name),
    shifts: (shifts.data || []).map((s) => ({ id: s.id, date: s.date, start: s.start_time, end: s.end_time, userId: s.user_id, role: s.role, notes: s.notes || "" })),
    availability: avail,
    trades: (trades.data || []).map((t) => ({ id: t.id, shiftId: t.shift_id, fromUserId: t.from_user, toUserId: t.to_user, status: t.status })),
    pay: payMap,
    published: pubMap,
    notifications: (notifs.data || []).map((n) => ({ id: n.id, userId: n.user_id, type: n.type, text: n.body, ts: new Date(n.created_at).getTime(), read: n.read })),
    announcements: (anns.data || []).map((a) => ({ id: a.id, authorId: a.author_id, title: a.title, body: a.body || "", ts: new Date(a.created_at).getTime() })),
    channels: (channels.data || []).map((c) => ({ id: c.id, name: c.name, members: (cmembers.data || []).filter((m) => m.channel_id === c.id).map((m) => m.user_id) })),
    messages: (messages.data || []).map((m) => ({ id: m.id, channelId: m.channel_id, userId: m.user_id, text: m.body, ts: new Date(m.created_at).getTime() })),
    settings: (settings.data && settings.data[0])
      ? { visible: true, lat: settings.data[0].store_lat, lng: settings.data[0].store_lng, radius: Number(settings.data[0].radius_miles) || 1, address: settings.data[0].store_address || "" }
      : { visible: false, lat: null, lng: null, radius: 1, address: "" },
    timeEntries: (timeEntries.data || []).map((t) => ({ id: t.id, userId: t.user_id, in: new Date(t.clock_in).getTime(), out: t.clock_out ? new Date(t.clock_out).getTime() : null })),
    timeOff: (timeOff.data || []).map((t) => ({ id: t.id, userId: t.user_id, start: t.start_date, end: t.end_date, reason: t.reason || "", status: t.status, ts: new Date(t.created_at).getTime() })),
  };
}

/* ---------------- REALTIME ---------------- */
function subscribe(onChange) {
  const ch = supabase
    .channel("calistos-all")
    .on("postgres_changes", { event: "*", schema: "public" }, onChange)
    .subscribe();
  return () => supabase.removeChannel(ch);
}

/* ---------------- ACTIONS ----------------
   meId is passed in from the app for "current user" writes.        */
function makeActions(meId) {
  return {
    // shifts
    addShift: ({ date, start, end, userId, role, notes }) =>
      supabase.from("shifts").insert({ date, start_time: start, end_time: end, user_id: userId, role, notes }),
    updateShift: (id, { date, start, end, userId, role, notes }) =>
      supabase.from("shifts").update({ date, start_time: start, end_time: end, user_id: userId, role, notes }).eq("id", id),
    deleteShift: (id) => supabase.from("shifts").delete().eq("id", id),

    // availability
    setAvailability: (userId, dow, { on, s, e }) =>
      supabase.from("availability").upsert({ user_id: userId, dow, available: on, start_time: s, end_time: e }, { onConflict: "user_id,dow" }),

    // chat
    sendMessage: (channelId, body) =>
      supabase.from("messages").insert({ channel_id: channelId, user_id: meId, body }),

    // pay
    setTip: (shiftId, tips) =>
      supabase.from("pay").upsert({ shift_id: shiftId, tips }, { onConflict: "shift_id" }),
    setWeekPaid: (shiftIds, paid) =>
      supabase.from("pay").upsert(shiftIds.map((id) => ({ shift_id: id, paid })), { onConflict: "shift_id" }),
    affirmPay: async (shiftId, on) =>
      on
        ? supabase.from("pay_affirmations").upsert({ shift_id: shiftId, user_id: meId }, { onConflict: "shift_id,user_id" })
        : supabase.from("pay_affirmations").delete().eq("shift_id", shiftId).eq("user_id", meId),

    // schedule release
    releaseWeek: (weekKey) =>
      supabase.from("published").upsert({ week_key: weekKey, released_at: new Date().toISOString(), released_by: meId }, { onConflict: "week_key" }),

    // announcements
    postAnnouncement: ({ title, body }) =>
      supabase.from("announcements").insert({ author_id: meId, title, body }),
    deleteAnnouncement: (id) => supabase.from("announcements").delete().eq("id", id),

    // trades
    offerTrade: ({ shiftId, toUser }) =>
      supabase.from("trades").insert({ shift_id: shiftId, from_user: meId, to_user: toUser, status: "pending" }),
    respondTrade: (id, accept) =>
      supabase.from("trades").update({ status: accept ? "accepted" : "declined" }).eq("id", id),
    cancelTrade: (id) => supabase.from("trades").update({ status: "cancelled" }).eq("id", id),
    decideTrade: (id, approve) =>
      supabase.from("trades").update({ status: approve ? "approved" : "denied" }).eq("id", id),

    // roles
    addRole: (name) => supabase.from("roles").insert({ name }),
    removeRole: (name) => supabase.from("roles").delete().eq("name", name),

    // team
    updateMember: async (id, { name, position, access, jobRoles, rate, method }) => {
      await supabase.from("profiles").update({ name, position, access, title: cap(position), job_roles: jobRoles }).eq("id", id);
      return supabase.from("private_pay").upsert({ user_id: id, rate, method }, { onConflict: "user_id" });
    },
    removeMember: (id) => supabase.from("profiles").delete().eq("id", id),

    // my profile
    updateMyProfile: ({ method, handle }) =>
      supabase.from("private_pay").upsert({ user_id: meId, method, handle }, { onConflict: "user_id" }),

    // store location + time clock
    setStoreLocation: (lat, lng, radius, address) =>
      supabase.from("settings").update({ store_lat: lat, store_lng: lng, radius_miles: radius, store_address: address || null, updated_by: meId, updated_at: new Date().toISOString() }).eq("id", 1),
    clockIn: (lat, lng) =>
      supabase.from("time_entries").insert({ user_id: meId, in_lat: lat, in_lng: lng }),
    clockOut: (entryId, lat, lng) =>
      supabase.from("time_entries").update({ clock_out: new Date().toISOString(), out_lat: lat, out_lng: lng }).eq("id", entryId),

    // time off
    requestTimeOff: ({ start, end, reason }) =>
      supabase.from("time_off").insert({ user_id: meId, start_date: start, end_date: end, reason }),
    decideTimeOff: (id, approve) =>
      supabase.from("time_off").update({ status: approve ? "approved" : "denied" }).eq("id", id),
    cancelTimeOff: (id) =>
      supabase.from("time_off").update({ status: "cancelled" }).eq("id", id),

    // notifications
    markNotificationsRead: () =>
      supabase.from("notifications").update({ read: true }).eq("user_id", meId).eq("read", false),
  };
}

function mondayOf(date) { const d = new Date(date); const day = (d.getDay() + 6) % 7; d.setDate(d.getDate() - day); d.setHours(0, 0, 0, 0); return d; }
function weekDates(offset = 0) { const m = mondayOf(new Date()); m.setDate(m.getDate() + offset * 7); return Array.from({ length: 7 }, (_, i) => { const d = new Date(m); d.setDate(m.getDate() + i); return d; }); }

function toMin(t) { const [h, m] = t.split(":").map(Number); return h * 60 + m; }
function hoursBetween(s, e) { let d = (toMin(e) - toMin(s)) / 60; if (d < 0) d += 24; return Math.round(d * 100) / 100; }
function fmtTime(t) { const [h, m] = t.split(":").map(Number); const ap = h >= 12 ? "PM" : "AM"; const hh = h % 12 || 12; return `${hh}:${pad(m)} ${ap}`; }

function milesBetween(lat1, lng1, lat2, lng2) {
  const r = (d) => (d * Math.PI) / 180;
  return 3958.8 * 2 * Math.asin(Math.sqrt(
    Math.sin(r(lat2 - lat1) / 2) ** 2 +
    Math.cos(r(lat1)) * Math.cos(r(lat2)) * Math.sin(r(lng2 - lng1) / 2) ** 2
  ));
}
function getPosition() {
  return new Promise((resolve, reject) => {
    if (!navigator.geolocation) return reject(new Error("This device doesn't support location."));
    navigator.geolocation.getCurrentPosition(
      (p) => resolve({ lat: p.coords.latitude, lng: p.coords.longitude }),
      (e) => reject(new Error(e.code === 1 ? "Location permission was denied. Allow location access and try again." : "Couldn't get your location. Try again.")),
      { enableHighAccuracy: true, timeout: 12000, maximumAge: 30000 }
    );
  });
}
async function geocodeAddress(addr) {
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(addr)}`, { headers: { Accept: "application/json" } });
  if (!res.ok) throw new Error("The address lookup service didn't respond — try again in a minute.");
  const j = await res.json();
  if (!j.length) throw new Error("Address not found — try adding the city and state.");
  return { lat: parseFloat(j[0].lat), lng: parseFloat(j[0].lon), address: addr };
}

function App() {
  const [session, setSession] = useState(null);
  const [db, setDb] = useState(null);
  const [booting, setBooting] = useState(true);
  const [tab, setTab] = useState("schedule");

  const [recovery, setRecovery] = useState(false);
  useEffect(() => {
    auth.getSession().then(({ data }) => setSession(data.session));
    const sub = auth.onChange((s, event) => {
      setSession(s);
      if (event === "PASSWORD_RECOVERY") setRecovery(true);
      if (event === "SIGNED_OUT") setRecovery(false);
    });
    return () => sub.data.subscription.unsubscribe();
  }, []);

  const refresh = useCallback(async () => { try { setDb(await loadAll()); } catch (e) { console.warn(e); } }, []);

  useEffect(() => {
    if (!session) { setDb(null); setBooting(false); return; }
    let active = true; setBooting(true);
    refresh().then(() => active && setBooting(false));
    const unsub = subscribe(() => refresh());
    return () => { active = false; unsub(); };
  }, [session, refresh]);

  const meId = session?.user?.id || null;
  const rawActions = useMemo(() => makeActions(meId), [meId]);
  const actions = useMemo(() => {
    const o = {};
    for (const k of Object.keys(rawActions)) o[k] = async (...a) => { const r = await rawActions[k](...a); await refresh(); return r; };
    return o;
  }, [rawActions, refresh]);

  if (!session) return <Shell><AuthScreen /></Shell>;
  if (recovery) return <Shell><SetNewPassword onDone={() => setRecovery(false)} /></Shell>;
  if (booting || !db) return <Shell><Splash text="Opening the counter…" /></Shell>;

  const me = db.users.find((u) => u.id === meId);
  if (!me) return <Shell><Splash text="Finishing account setup…" sub="If this persists, your profile may not exist yet — try again in a moment." action={<Btn onClick={refresh}>Refresh</Btn>} /></Shell>;

  const isEmployer = me.access === "employer";
  const tabs = [
    { id: "schedule", label: "Schedule", icon: CalendarDays }, { id: "availability", label: "Availability", icon: Clock },
    { id: "chat", label: "Chat", icon: MessageSquare }, { id: "pay", label: "Pay", icon: Wallet },
    { id: "news", label: "News", icon: Megaphone }, { id: "team", label: "Team", icon: Users },
  ];

  return (
    <Shell>

function ForgotPassword({ goLogin }) {
  const [method, setMethod] = useState("email");
  const [step, setStep] = useState("start"); // start | emailSent | code | newpass
  const [email, setEmail] = useState("");
  const [phone, setPhone] = useState("");
  const [code, setCode] = useState("");
  const [pw, setPw] = useState("");
  const [pw2, setPw2] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  async function sendEmail() {
    if (!email.trim()) { setErr("Enter your account email."); return; }
    setBusy(true); setErr("");
    const { error } = await auth.sendResetEmail(email.trim());
    setBusy(false);
    if (error) { setErr(error.message); return; }
    setStep("emailSent");
  }
  async function sendSms() {
    if (!phone.trim()) { setErr("Enter your account phone number."); return; }
    setBusy(true); setErr("");
    const { error } = await auth.sendPhoneCode(phone.trim());
    setBusy(false);
    if (error) {
      const m = error.message || "";
      setErr(/provider|sms|not enabled|unsupported/i.test(m)
        ? "Text-message reset isn't switched on for this workspace yet (it needs an SMS provider in Supabase). Use email reset, or ask the owner."
        : m);
      return;
    }
    setStep("code");
  }
  async function verify() {
    if (code.trim().length < 6) { setErr("Enter the 6-digit code from the text."); return; }
    setBusy(true); setErr("");
    const { error } = await auth.verifyPhoneCode(phone.trim(), code.trim());
    setBusy(false);
    if (error) { setErr(error.message); return; }
    setStep("newpass"); // OTP verified -> signed in -> can set password
  }
  async function saveNewPass() {
    if (pw.length < 6) { setErr("Use at least 6 characters."); return; }
    if (pw !== pw2) { setErr("Passwords don't match."); return; }
    setBusy(true); setErr("");
    const { error } = await auth.updatePassword(pw);
    setBusy(false);
    if (error) { setErr(error.message); return; }
    // signed in with new password; App will render the main UI via session
  }

  return (
    <div>
      <h2 style={{ fontFamily: "Fraunces, serif", fontSize: 22, color: C.ink, margin: "0 0 4px" }}>Reset your password</h2>

          <Btn onClick={sendEmail} disabled={busy} style={{ width: "100%", justifyContent: "center" }}>{busy ? "Sending…" : "Email me a reset link"}</Btn>
        </>
      )}

      {step === "emailSent" && (
        <div style={{ textAlign: "center" }}>
          <div style={{ width: 52, height: 52, borderRadius: "50%", background: C.maroonSoft, display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}><MailCheck size={24} color={C.maroon} /></div>

function ShiftModal({ db, shift, onClose, actions }) {

      <div style={{ display: "flex", gap: 10 }}><div style={{ flex: 1 }}><Field label="Start"><input type="time" style={inputStyle} value={start} onChange={(e) => setStart(e.target.value)} /></Field></div><div style={{ flex: 1 }}><Field label="End"><input type="time" style={inputStyle} value={end} onChange={(e) => setEnd(e.target.value)} /></Field></div></div>

  );

function MyPayView({ db, me, actions }) {

function AffirmCluster({ shifts, db }) {

function TipsModal({ db, weekKeys, onClose, actions }) {
  const shifts = db.shifts.filter((s) => weekKeys.includes(s.date));
  const [pool, setPool] = useState("");
  function distribute() { const amt = parseFloat(pool) || 0; if (!amt || shifts.length === 0) return; const totalHours = shifts.reduce((a, s) => a + hoursBetween(s.start, s.end), 0); shifts.forEach((s) => { const share = totalHours ? (hoursBetween(s.start, s.end) / totalHours) * amt : 0; actions.setTip(s.id, Math.round(share * 100) / 100); }); onClose(); }
  return (
    <Modal title="Tips for the week" onClose={onClose}>

function EditMemberModal({ db, me, member, onClose, actions }) {
  const [name, setName] = useState(member.name);
  const [rate, setRate] = useState(member.rate);
  const [method, setMethod] = useState(member.method === "—" ? "Direct deposit" : member.method);
  const [position, setPosition] = useState(member.position);
  const [access, setAccess] = useState(member.access);
  const [jobRoles, setJobRoles] = useState(member.jobRoles);
  const [err, setErr] = useState("");
  function toggleRole(r) { setJobRoles((j) => j.includes(r) ? j.filter((x) => x !== r) : [...j, r]); }
  function pickPosition(p) { setPosition(p); setAccess(p === "employee" ? "employee" : "employer"); }
  function save() {
    const otherEmployers = db.users.filter((u) => u.id !== member.id && u.access === "employer").length;
    if (access === "employee" && otherEmployers === 0) { setErr("There must be at least one employer."); return; }
    const otherOwners = db.users.filter((u) => u.id !== member.id && u.position === "owner").length;
    if (member.position === "owner" && position !== "owner" && otherOwners === 0) { setErr("There must be at least one owner."); return; }
    actions.updateMember(member.id, { name, position, access, jobRoles, rate: parseFloat(rate) || 0, method });
    onClose();
  }
  function remove() {
    const otherEmployers = db.users.filter((u) => u.id !== member.id && u.access === "employer").length;

    <Modal title={`Edit ${member.name}`} onClose={onClose} wide>

      <Field label="Roles this person can work"><div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>{db.roles.map((r) => { const on = jobRoles.includes(r); return <button key={r} onClick={() => toggleRole(r)} className="cw-pill" style={{ cursor: "pointer", border: `1px solid ${on ? C.maroon : C.line}`, background: on ? C.maroon : "#fff", color: on ? "#fff" : C.muted }}>{on && <Check size={12} />} {r}</button>; })}</div></Field>
      {err && <div style={{ color: C.danger, fontSize: 12.5, marginBottom: 10 }}>{err}</div>}
      <div style={{ display: "flex", gap: 9, justifyContent: "space-between" }}>{member.id !== me.id ? <Btn variant="danger" small onClick={remove}><Trash2 size={14} /> Remove</Btn> : <span />}<div style={{ display: "flex", gap: 9 }}><Btn variant="ghost" onClick={onClose}>Cancel</Btn><Btn onClick={save}>Save</Btn></div></div>

/* ---------------- TIME CLOCK ---------------- */
function ClockCard({ db, me, actions }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const open = (db.timeEntries || []).find((t) => t.userId === me.id && !t.out);
  const [, setTick] = useState(0);
  useEffect(() => { if (!open) return; const iv = setInterval(() => setTick((x) => x + 1), 30000); return () => clearInterval(iv); }, [open]);
  const s = db.settings || {};
  const isEmp = me.access === "employer";
  // Employers can see settings; employees can't (privacy), so for them the
  // distance check happens purely server-side inside the database trigger.
  const employerKnowsUnset = isEmp && s.visible && s.lat == null;
  async function act() {
    setBusy(true); setErr("");
    try {
      const pos = await getPosition();
      if (s.visible && s.lat != null) {
        const d = milesBetween(pos.lat, pos.lng, s.lat, s.lng);
        if (d > (s.radius || 1)) { setErr(`You're ${d.toFixed(1)} mi from the store — you need to be within ${s.radius} mi.`); setBusy(false); return; }
      }
      const res = open ? await actions.clockOut(open.id, pos.lat, pos.lng) : await actions.clockIn(pos.lat, pos.lng);
      if (res?.error) setErr(res.error.message);
    } catch (e) { setErr(e.message); }
    setBusy(false);
  }
  return (
    <div className="cw-card" style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 12, padding: "11px 13px", borderLeft: `4px solid ${open ? C.green : C.silver}`, flexWrap: "wrap" }}>
      <Timer size={19} color={open ? C.green : C.steel} />
      <div style={{ flex: 1, minWidth: 180 }}>
        <div style={{ fontWeight: 700, fontSize: 13.5, color: open ? C.green : C.ink }}>{open ? `Clocked in · ${fmtDur(Date.now() - open.in)}` : "Not clocked in"}</div>
        <div style={{ fontSize: 11.5, color: C.muted }}>{employerKnowsUnset ? "Store location isn't set — set it in the Team tab first." : "Your location is checked when you clock in or out."}</div>
        {err && <div style={{ fontSize: 12, color: C.danger, marginTop: 3 }}>{err}</div>}
      </div>
      <Btn small variant={open ? "ghost" : "green"} disabled={busy || employerKnowsUnset} onClick={act}>{busy ? "Locating…" : open ? "Clock out" : "Clock in"}</Btn>
    </div>
  );
}

function StoreLocationCard({ db, actions }) {
  const s = db.settings || {};
  const [addr, setAddr] = useState(s.address || "");
  const [radius, setRadius] = useState(s.radius || 1);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const set = s.lat != null;
  async function findAndSet() {
    if (!addr.trim()) { setErr("Type the store address first."); return; }
    setBusy(true); setErr("");
    try {
      const loc = await geocodeAddress(addr.trim());
      const res = await actions.setStoreLocation(loc.lat, loc.lng, parseFloat(radius) || 1, loc.address);
      if (res?.error) setErr(res.error.message);
    } catch (e) { setErr(e.message); }
    setBusy(false);
  }
  return (
    <div className="cw-card" style={{ marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}><MapPin size={16} color={C.maroon} /><span style={{ fontWeight: 700, fontSize: 13.5, color: C.ink }}>Store location (clock-in geofence)</span><span className="cw-pill" style={{ background: C.maroonSoft, color: C.maroon, marginLeft: "auto" }}><ShieldCheck size={11} /> Employers only</span></div>
      <p style={{ fontSize: 12.5, color: C.muted, margin: "0 0 11px" }}>{set ? <>Set to <b style={{ color: C.ink }}>{s.address || "saved location"}</b> · staff can clock in within {s.radius} mi.</> : "Not set — nobody can clock in until you set this."}</p>
      <Field label="Store address"><input style={inputStyle} value={addr} onChange={(e) => { setAddr(e.target.value); setErr(""); }} placeholder="682A Tremont St, Boston, MA" onKeyDown={(e) => e.key === "Enter" && findAndSet()} /></Field>
      <div style={{ display: "flex", gap: 9, alignItems: "center", flexWrap: "wrap" }}>
        <Btn small onClick={findAndSet} disabled={busy}><MapPin size={14} /> {busy ? "Finding…" : set ? "Update location" : "Find & set location"}</Btn>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12.5, color: C.muted }}>Radius <input type="number" min="0.1" step="0.1" value={radius} onChange={(e) => setRadius(e.target.value)} style={{ ...inputStyle, width: 70, padding: "5px 7px" }} /> mi</label>
      </div>
      {err && <div style={{ fontSize: 12, color: C.danger, marginTop: 8 }}>{err}</div>}
      <div style={{ fontSize: 11.5, color: C.steel, marginTop: 9, display: "flex", gap: 6 }}><Info size={13} style={{ flexShrink: 0, marginTop: 1 }} />Only employers can see or change this — staff can't view the address or coordinates; their clock-in is simply checked against it.</div>
    </div>
  );
}

/* ---------------- TIME OFF ---------------- */
function MyTimeOff({ db, me, actions }) {
  const [start, setStart] = useState(""); const [end, setEnd] = useState(""); const [reason, setReason] = useState("");
  const [err, setErr] = useState("");
  const mineList = (db.timeOff || []).filter((t) => t.userId === me.id && t.status !== "cancelled");
  const statusPill = (s) => s === "approved" ? { bg: C.greenSoft, fg: C.green, t: "Approved" } : s === "denied" ? { bg: "#EFD9D7", fg: C.danger, t: "Denied" } : { bg: C.amberSoft, fg: C.amber, t: "Pending" };
  async function submit() {
    if (!start) { setErr("Pick a start date."); return; }
    const e2 = end || start;
    if (e2 < start) { setErr("End date is before start date."); return; }
    setErr("");
    const res = await actions.requestTimeOff({ start, end: e2, reason: reason.trim() });
    if (res?.error) { setErr(res.error.message); return; }
    setStart(""); setEnd(""); setReason("");
  }
  return (
    <div style={{ marginTop: 22 }}>
      <div style={{ fontSize: 12.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}><CalendarOff size={14} /> Time off</div>
      <div className="cw-card" style={{ marginBottom: 12 }}>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <div style={{ flex: 1, minWidth: 130 }}><Field label="First day off"><input type="date" style={inputStyle} value={start} onChange={(e) => { setStart(e.target.value); setErr(""); }} /></Field></div>
          <div style={{ flex: 1, minWidth: 130 }}><Field label="Last day off"><input type="date" style={inputStyle} value={end} onChange={(e) => { setEnd(e.target.value); setErr(""); }} /></Field></div>
        </div>
        <Field label="Reason (optional)"><input style={inputStyle} value={reason} onChange={(e) => setReason(e.target.value)} placeholder="e.g. family trip" /></Field>
        {err && <div style={{ color: C.danger, fontSize: 12.5, marginBottom: 10 }}>{err}</div>}
        <Btn small onClick={submit}><Plus size={14} /> Request time off</Btn>
      </div>
      {mineList.length > 0 && (
        <div style={{ display: "grid", gap: 8 }}>
          {mineList.map((t) => { const p = statusPill(t.status);
            return <div key={t.id} className="cw-card" style={{ display: "flex", alignItems: "center", gap: 10, padding: "11px 13px" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600, color: C.ink }}>{dlabel(t.start)}{t.end !== t.start ? ` → ${dlabel(t.end)}` : ""}</div>
                {t.reason && <div style={{ fontSize: 12, color: C.muted, marginTop: 2 }}>{t.reason}</div>}
              </div>
              <span className="cw-pill" style={{ background: p.bg, color: p.fg }}>{p.t}</span>
              {t.status === "pending" && <Btn small variant="danger" onClick={() => actions.cancelTimeOff(t.id)}>Cancel</Btn>}
            </div>; })}
        </div>
      )}
    </div>
  );
}

function TimeOffManager({ db, actions }) {
  const getU = (id) => db.users.find((u) => u.id === id);
  const pending = (db.timeOff || []).filter((t) => t.status === "pending");
  const upcoming = (db.timeOff || []).filter((t) => t.status === "approved" && t.end >= todayKey());
  if (pending.length === 0 && upcoming.length === 0) return null;
  return (
    <div style={{ marginTop: 22 }}>
      <div style={{ fontSize: 12.5, fontWeight: 700, color: C.muted, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}><CalendarOff size={14} /> Time off</div>
      {pending.length > 0 && (
        <div style={{ display: "grid", gap: 9, marginBottom: 14 }}>
          {pending.map((t) => { const u = getU(t.userId);
            return <div key={t.id} className="cw-card" style={{ borderLeft: `4px solid ${C.amber}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 9, marginBottom: 8 }}><Avatar user={u} size={26} /><div style={{ fontSize: 13.5, color: C.ink }}><b>{u?.name}</b> requests {dlabel(t.start)}{t.end !== t.start ? ` → ${dlabel(t.end)}` : ""}{t.reason ? <span style={{ color: C.muted }}> · {t.reason}</span> : ""}</div></div>
              <div style={{ display: "flex", gap: 9 }}><Btn small variant="green" onClick={() => actions.decideTimeOff(t.id, true)}><Check size={14} /> Approve</Btn><Btn small variant="danger" onClick={() => actions.decideTimeOff(t.id, false)}><X size={14} /> Deny</Btn></div>
            </div>; })}
        </div>
      )}
      {upcoming.length > 0 && (
        <div className="cw-card">
          <div style={{ fontWeight: 700, fontSize: 12.5, color: C.ink, marginBottom: 8 }}>Approved upcoming leave</div>
          {upcoming.map((t) => { const u = getU(t.userId);
            return <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", fontSize: 13, color: C.muted }}><Avatar user={u} size={20} /><span style={{ color: C.ink, fontWeight: 600 }}>{u?.name}</span> {dlabel(t.start)}{t.end !== t.start ? ` → ${dlabel(t.end)}` : ""}</div>; })}
        </div>
      )}
    </div>
  );
}

function SectionTitle({ title, sub, action }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginBottom: 16, gap: 12 }}>
      <div><h2 style={{ fontFamily: "Fraunces, serif", fontSize: 24, color: C.ink, margin: 0, fontWeight: 600 }}>{title}</h2>{sub && <p style={{ fontSize: 13, color: C.muted, margin: "3px 0 0" }}>{sub}</p>}</div>
      {action}
    </div>
  );
}
